---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: 1.11.2
      sourceRef:
        kind: HelmRepository
        name: chart-longhorn
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
  values:
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 1
      reclaimPolicy: Retain
      recurringJobSelector:
        enable: false
    defaultSettings:
      storageOverProvisioningPercentage: 100
      storageMinimalAvailablePercentage: 10
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      restoreVolumeRecurringJobs: true
      concurrentAutomaticEngineUpgradePerNodeLimit: 1
      defaultDataPath: /var/lib/longhorn/
      defaultReplicaCount: 1
      backupTarget: "nfs://${STORAGE_NAS_IP}:/volume1/kubeNFS/cluster-backups"
      # Single-node cluster: every volume's last replica is always on this node,
      # so block-if-contains-last-replica (the default) permanently blocks all node drain.
      nodeDrainPolicy: always-allow
