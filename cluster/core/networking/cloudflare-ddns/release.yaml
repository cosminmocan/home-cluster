---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cloudflare-ddns
  namespace: networking
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.0.1
      sourceRef:
        kind: HelmRepository
        name: chart-bjw
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      cloudflare-ddns:
        type: cronjob
        cronjob:
          concurrencyPolicy: Forbid
          schedule: "@hourly"
        pod:
          restartPolicy: OnFailure
        containers:
          app:
            image:
              repository: alpine/curl
              tag: "latest"
            command: ["/bin/sh", "/app/cloudflare-ddns.sh"]
            env:
              CLOUDFLARE_EMAIL:
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: SECRET_CLOUDFLARE_EMAIL
              CLOUDFLARE_APIKEY:
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: CLOUDFLARE_APIKEY
              CLOUDFLARE_RECORD_NAME:
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: CLOUDFLARE_DDNS_RECORD
    
    persistence:
      config:
        type: configMap
        name: cloudflare-ddns-configmap
        defaultMode: 0775
        globalMounts:
          - path: /app/cloudflare-ddns.sh
            subPath: cloudflare-ddns.sh
