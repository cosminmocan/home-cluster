---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-core-traefik-certificates
  namespace: flux-system
spec:
  path: ./cluster/core/networking/traefik/certificates
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cluster-core-cert-manager-issuers
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 20m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-core-traefik
  namespace: flux-system
spec:
  dependsOn:
    - name: cluster-core-traefik-certificates
  path: ./cluster/core/networking/traefik/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: traefik
      namespace: networking
  interval: 30m
  retryInterval: 1m
  timeout: 20m
---
# Middlewares are applied after Traefik because Traefik installs its own CRDs (Middleware,
# TLSOption, etc.) — applying these objects before the CRDs exist would fail the reconciliation.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-core-traefik-middlewares
  namespace: flux-system
spec:
  dependsOn:
    - name: cluster-core-traefik
  path: ./cluster/core/networking/traefik/middlewares
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 10m
