---
# Restrict to TLSv1.2/1.3 with modern cipher suites (equivalent to nginx ssl-protocols config)
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: tlsoptions
  namespace: networking
spec:
  minVersion: VersionTLS12
  sniStrict: false
  cipherSuites:
    - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
    - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
---
# Applied to all HTTPS routes via the websecure entrypoint — sets HSTS and forwarded proto.
# Cloudflare real-IP resolution is handled by forwardedHeaders.trustedIPs on the entrypoint,
# not by this middleware.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: default-headers
  namespace: networking
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    forceSTSHeader: true
    customRequestHeaders:
      X-Forwarded-Proto: "https"
---
# For apps that handle large file uploads or streaming (music, photos, drive).
# Replaces nginx annotations: proxy-body-size=0, proxy-buffering=off,
# proxy-request-buffering=off, proxy-max-temp-file-size=0
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: buffering-large-files
  namespace: networking
spec:
  buffering:
    maxRequestBodyBytes: 0
    memRequestBodyBytes: 10485760
    maxResponseBodyBytes: 0
    memResponseBodyBytes: 10485760
---
# ForwardAuth for Authentik — used by qBittorrent.
# Uses the /auth/traefik endpoint (not /auth/nginx).
# The redirect to the Authentik login page is handled by the outpost itself;
# no auth-signin annotation is needed here.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: networking
spec:
  forwardAuth:
    address: "http://ak-outpost-authentik-embedded-outpost.database.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik"
    trustForwardHeader: true
    authResponseHeaders:
      - Set-Cookie
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
