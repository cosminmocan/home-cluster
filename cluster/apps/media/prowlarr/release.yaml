---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.0.1
      sourceRef:
        kind: HelmRepository
        name: chart-bjw
        namespace: flux-system
  values:
    hostname: prowlarr

    controllers:
      main:
        enabled: true

    containers:
      main:
        image:
          repository: ghcr.io/onedr0p/prowlarr-develop
          tag: 1.13.0.4217
        env:
          - name: TZ
            value: ${TIMEZONE}
          - name: PROWLARR__LOG_LEVEL
            value: info
          - name: PROWLARR__BRANCH
            value: develop
          - name: PROWLARR__APPLICATION_URL
            value: "https://prowlarr.${SECRET_DOMAIN}"
          - name: PROWLARR__POSTGRES_HOST
            value: "${POSTGRES_HOST_ADDRESS}"
          - name: PROWLARR__POSTGRES_MAIN_DB
            value: prowlarr-main
          - name: PROWLARR__POSTGRES_LOG_DB
            value: prowlarr-log
          - name: PROWLARR__POSTGRES_USER
            value: "postgres"
          - name: PROWLARR__POSTGRES_PASSWORD
            value: "${SECRET_POSTGRES_ADMIN_PASS}"
          - name: PROWLARR__PORT
            value: "9696"
          - name: PROWLARR__API_KEY
            value: "${PROWLARR_SECRET_KEY}"
        resources:
          requests:
            memory: 130Mi
            cpu: 15m
          limits:
            memory: 800Mi
            cpu: 500m

    services:
      main:
        ports:
          http:
            port: 9696

    ingress:
      main:
        enabled: true
        ingressClassName: nginx
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Prowlarr
          gethomepage.dev/icon: mdi-cat
        hosts:
          - host: &host "prowlarr.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host

    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"

    persistence:
      enabled: true
      items:
        - name: config
          type: pvc
          existingClaim: prowlarr-config-v2
