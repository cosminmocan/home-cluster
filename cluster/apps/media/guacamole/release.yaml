apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: guacamole
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.0.1
      sourceRef:
        kind: HelmRepository
        name: chart-bjw
        namespace: flux-system
  values:
    controller:
      type: deployment

    image:
      repository: docker.io/flcontainers/guacamole
      tag: 1.5.5

    env:
      TZ: "${TIMEZONE}"
      EXTENSIONS: auth-sso-openid

    resources:
      requests:
        cpu: 200m
        memory: 200Mi
      limits:
        memory: 500Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080

    ingress:
      main:
        enabled: true
        annotations:
          kubernetes.io/ingress.class: nginx
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Guacamole
          gethomepage.dev/icon: cbi:guacamole
          external-dns.alpha.kubernetes.io/target: "${CLOUDFLARE_DDNS_RECORD}"
        hosts:
          - host: remote.${SECRET_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - remote.${SECRET_DOMAIN}

    persistence:
      config:
        enabled: true
        existingClaim: guacamole-config

    mounts:
      config:
        mountPath: /config
