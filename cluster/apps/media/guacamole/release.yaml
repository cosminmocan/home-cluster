---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app guacamole
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.0.1
      sourceRef:
        kind: HelmRepository
        name: chart-bjw
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      guacamole:
        containers:
          app:
            image:
              repository: docker.io/flcontainers/guacamole
              tag: 1.5.5
            env:
              TZ: "${TIMEZONE}"
              EXTENSIONS: auth-sso-openid
            resources:
              requests:
                cpu: 200m
                memory: 200Mi
              limits:
                memory: 500Mi
    service:
      app:
        controller: guacamole
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Guacamole
          gethomepage.dev/icon: cbi:guacamole
          external-dns.alpha.kubernetes.io/target: "${CLOUDFLARE_DDNS_RECORD}"
        labels:
          teleport: enabled
        ports:
          http:
            port: 8080
    ingress:
      guacamole:
        className: traefik
        hosts:
          - host: &host remote.${SECRET_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host
    persistence:
      config:
        existingClaim: guacamole-config
        globalMounts:
          - path: /config
