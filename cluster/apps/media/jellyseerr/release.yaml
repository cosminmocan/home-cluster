---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyseerr
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.0.1
      sourceRef:
        kind: HelmRepository
        name: chart-bjw
        namespace: flux-system
  values:
    controllers:
      main:
        enabled: true
    containers:
      main:
        image:
          repository: docker.io/fallenbagel/jellyseerr
          tag: 2.3.0
        env:
          - name: TZ
            value: ${TIMEZONE}
          - name: LOG_LEVEL
            value: "info"
        resources:
          requests:
            cpu: 50m
            memory: 80Mi
          limits:
            cpu: 800m
            memory: 800Mi
    services:
      main:
        ports:
          http:
            port: 5055
    ingress:
      main:
        enabled: true
        ingressClassName: nginx
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Jellyseerr
          gethomepage.dev/icon: mdi-jellyfish-outline
          external-dns.alpha.kubernetes.io/target: "${CLOUDFLARE_DDNS_RECORD}"
        hosts:
          - host: &host jellyseerr.${SECRET_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host
    persistence:
      enabled: true
      items:
        - name: config
          type: pvc
          existingClaim: jellyseerr-config
          mountPath: /app/config
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"
