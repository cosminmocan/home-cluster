---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app radarr
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: chart-bjw
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: postgresql
      namespace: database
    - name: longhorn
      namespace: longhorn-system
  values:
    controllers:
      radarr:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
        initContainers:
          # Wait until Postgres accepts connections before the app starts its DB
          # migration — prevents the boot race (e.g. after a node reboot) that left
          # Radarr stuck in "waiting for user intervention".
          wait-for-db:
            image:
              repository: docker.io/bitnamilegacy/postgresql
              tag: 17.6.0-debian-12-r4
            env:
              POSTGRES_HOST: "${POSTGRES_HOST_ADDRESS}"
            command:
              - sh
              - -c
              - until pg_isready -h "$POSTGRES_HOST" -p 5432 -U postgres; do echo "waiting for postgres..."; sleep 3; done
        containers:
          app:
            image:
              repository: ghcr.io/onedr0p/radarr
              tag: 5.20.1.9773
            env:
              TZ: ${TIMEZONE}
              RADARR__LOG_LEVEL: info
              RADARR__BRANCH: master
              RADARR__APPLICATION_URL: "https://radarr.${SECRET_DOMAIN}"
              RADARR__POSTGRES_HOST: "${POSTGRES_HOST_ADDRESS}"
              RADARR__POSTGRES_USER: "postgres"
              RADARR__POSTGRES_PASSWORD: "${SECRET_POSTGRES_ADMIN_PASS}"
              RADARR__POSTGRES_MAIN_DB: radarr-main
              RADARR__POSTGRES_LOG_DB: radarr-log
              RADARR__API_KEY: "${RADARR_SECRET_KEY}"
            resources:
              requests:
                cpu: 15m
                memory: 270Mi
              limits:
                memory: 400Mi
            # HTTP probes on /ping (unauthenticated). Startup gives slow first-boot
            # (DB migration) room; liveness restarts a stuck app instead of leaving
            # it "ready" but dead; readiness only sends traffic when actually serving.
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /ping, port: 7878 }
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 30
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /ping, port: 7878 }
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /ping, port: 7878 }
                  periodSeconds: 15
                  failureThreshold: 3
          metrics:
            image:
              repository: ghcr.io/onedr0p/exportarr
              tag: v2.2.0
            args: ["radarr"]
            env:
              PORT: &metrics-port 9707
              URL: "http://localhost:7878"
              APIKEY: "${RADARR_SECRET_KEY}"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
    service:
      app:
        controller: radarr
        ports:
          http:
            port: 7878
          metrics:
            port: *metrics-port
    ingress:
      radarr:
        className: traefik
        hosts:
          - host: &host "radarr.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host
    persistence:
      config:
        existingClaim: radarr-config
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: "${STORAGE_NAS_IP}"
        path: /volume1/kubeNFS/torrents
        globalMounts:
          - path: /downloads
