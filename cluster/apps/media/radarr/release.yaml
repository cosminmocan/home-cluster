---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app radarr
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: chart-bjw
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      radarr:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
        containers:
          app:
            image:
              repository: ghcr.io/onedr0p/radarr
              tag: 5.20.1.9773
            env:
              TZ: ${TIMEZONE}
              RADARR__LOG_LEVEL: info
              RADARR__BRANCH: master
              RADARR__APPLICATION_URL: "https://radarr.${SECRET_DOMAIN}"
              RADARR__POSTGRES_HOST: "${POSTGRES_HOST_ADDRESS}"
              RADARR__POSTGRES_USER: "postgres"
              RADARR__POSTGRES_PASSWORD: "${SECRET_POSTGRES_ADMIN_PASS}"
              RADARR__POSTGRES_MAIN_DB: radarr-main
              RADARR__POSTGRES_LOG_DB: radarr-log
              RADARR__API_KEY: "${RADARR_SECRET_KEY}"
            resources:
              requests:
                cpu: 15m
                memory: 380M
              limits:
                cpu: 500m
                memory: 970M
    service:
      app:
        controller: radarr
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: radarr
          gethomepage.dev/icon: filmstrip
        ports:
          http:
            port: 7878
    ingress:
      radarr:
        className: traefik
        hosts:
          - host: &host "radarr.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host
    persistence:
      config:
        existingClaim: radarr-config
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: "${STORAGE_NAS_IP}"
        path: /volume1/kubeNFS/torrents
        globalMounts:
          - path: /downloads
