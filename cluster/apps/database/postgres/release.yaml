---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: database
spec:
  interval: 15m
  chart:
    spec:
      chart: postgresql
      version: 16.7.27
      sourceRef:
        kind: HelmRepository
        name: chart-bitnami
        namespace: flux-system
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  values:
    global:
      security:
        allowInsecureImages: true
    image:
      registry: docker.io
      repository: bitnamilegacy/postgresql
      tag: 17.6.0-debian-12-r4
    auth:
      enablePostgresUser: true
      postgresPassword: ${SECRET_POSTGRES_ADMIN_PASS}
      database: postgres
    primary:
      resources:
        requests:
          cpu: 49m
          memory: 335Mi
        limits:
          memory: 512Mi
      persistence:
        enabled: true
        existingClaim: postgresql-data
    metrics:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/postgres-exporter
      serviceMonitor:
        enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi
