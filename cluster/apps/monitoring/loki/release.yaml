---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: loki
      version: 6.55.0
      sourceRef:
        kind: HelmRepository
        name: chart-grafana
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  values:
    # Single-node homelab: one Loki process, filesystem storage on Longhorn.
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      storage:
        type: filesystem
      limits_config:
        retention_period: 168h # 7d — trimmed to cut disk/write I/O on Longhorn
        # Accept the backlog Alloy reads from long-lived pods' existing log files
        # on first start (otherwise Loki 400s "entry too old" and spams errors).
        # Retention above still trims anything older than 14d.
        reject_old_samples: false
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
      pattern_ingester:
        enabled: false
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: longhorn
        size: 10Gi
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
    # Disable scalable-mode components (we run SingleBinary).
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
    # Trim everything not needed on a single small node.
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    gateway:
      enabled: false
    test:
      enabled: false
    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      serviceMonitor:
        enabled: true
    # Top-level key (not under monitoring) — disables the canary DaemonSet.
    lokiCanary:
      enabled: false
