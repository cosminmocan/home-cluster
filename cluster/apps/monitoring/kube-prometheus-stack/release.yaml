---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 84.x
      sourceRef:
        kind: HelmRepository
        name: chart-prometheus-community
        namespace: flux-system
  maxHistory: 3
  install:
    crds: Skip
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: Skip
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  values:
    crds:
      enabled: false

    # Ship the curated default alert rules (node, kube-state, prometheus health).
    # These were inert until now because Alertmanager was disabled.
    defaultRules:
      create: true

    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 96Mi
      # Routing: everything goes to Discord except the always-firing Watchdog.
      # Discord is reached via its Slack-compatible webhook endpoint, so we use
      # slack_configs. ${SECRET_PROMETHEUS_DISCORD_WEBHOOK} is injected by Flux
      # postBuild substitution from the cluster-secrets Secret and must be the
      # Discord webhook URL with the "/slack" suffix.
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: discord
          routes:
            - receiver: "null"
              matchers:
                - alertname = "Watchdog"
        receivers:
          - name: "null"
          - name: discord
            slack_configs:
              - api_url: ${SECRET_PROMETHEUS_DISCORD_WEBHOOK}
                send_resolved: true
                title: >-
                  {{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
                text: >-
                  {{ range .Alerts -}}
                  **{{ .Labels.severity | toUpper }}** — {{ .Annotations.summary }}
                  {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
                  {{ if .Labels.namespace }}namespace: `{{ .Labels.namespace }}`{{ end }}
                  {{ end }}
        # A critical alert silences the matching warning for the same object.
        inhibit_rules:
          - source_matchers: ['severity = "critical"']
            target_matchers: ['severity = "warning"']
            equal: ["alertname", "namespace"]

    grafana:
      enabled: true
      defaultDashboardsTimezone: ${TIMEZONE}
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - &host grafana.${SECRET_DOMAIN}
        tls:
          - hosts:
              - *host
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 2Gi
      resources:
        requests:
          cpu: 25m
          memory: 370Mi
        limits:
          memory: 400Mi

    prometheus:
      prometheusSpec:
        retention: 14d
        retentionSize: 8GB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        resources:
          requests:
            cpu: 50m
            memory: 512Mi
          limits:
            memory: 1Gi

    prometheusOperator:
      resources:
        requests:
          cpu: 15m
          memory: 128Mi
        limits:
          memory: 256Mi

    kube-state-metrics:
      resources:
        requests:
          cpu: 15m
          memory: 64Mi
        limits:
          memory: 128Mi

    nodeExporter:
      enabled: true

    prometheus-node-exporter:
      resources:
        requests:
          cpu: 15m
          memory: 100Mi
        limits:
          memory: 128Mi
