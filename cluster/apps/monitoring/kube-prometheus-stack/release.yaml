---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 84.x
      sourceRef:
        kind: HelmRepository
        name: chart-prometheus-community
        namespace: flux-system
  maxHistory: 3
  install:
    crds: Skip
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: Skip
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  values:
    crds:
      enabled: false

    # Ship the curated default alert rules (node, kube-state, prometheus health).
    # These were inert until now because Alertmanager was disabled.
    defaultRules:
      create: true

    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 96Mi
      # Routing: everything goes to Discord except the always-firing Watchdog.
      # Discord is reached via its Slack-compatible webhook endpoint, so we use
      # slack_configs. ${SECRET_PROMETHEUS_DISCORD_WEBHOOK} (injected by Flux
      # postBuild substitution from cluster-secrets) holds the raw Discord
      # webhook URL; the "/slack" suffix below switches it to Slack-payload mode.
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: discord
          routes:
            - receiver: "null"
              matchers:
                - alertname = "Watchdog"
        receivers:
          - name: "null"
          - name: discord
            slack_configs:
              - api_url: ${SECRET_PROMETHEUS_DISCORD_WEBHOOK}/slack
                send_resolved: true
                title: >-
                  {{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
                text: >-
                  {{ range .Alerts -}}
                  **{{ .Labels.severity | toUpper }}** — {{ .Annotations.summary }}
                  {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
                  {{ if .Labels.namespace }}namespace: `{{ .Labels.namespace }}`{{ end }}
                  {{ end }}
        # A critical alert silences the matching warning for the same object.
        inhibit_rules:
          - source_matchers: ['severity = "critical"']
            target_matchers: ['severity = "warning"']
            equal: ["alertname", "namespace"]
      # LAN-only ingress (no external-dns annotation → resolvable only internally, like Grafana).
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - alertmanager.${SECRET_DOMAIN}
        paths:
          - /
        tls:
          - hosts:
              - alertmanager.${SECRET_DOMAIN}

    grafana:
      enabled: true
      defaultDashboardsTimezone: ${TIMEZONE}
      # Loki logs datasource (Phase 3) — lets you pivot from a metric to its logs.
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          access: proxy
          url: http://loki.monitoring.svc.cluster.local:3100
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - &host grafana.${SECRET_DOMAIN}
        tls:
          - hosts:
              - *host
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 2Gi
      # Provision app dashboards as-code (fetched from grafana.com at pod start).
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ""
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      dashboards:
        default:
          traefik:
            gnetId: 17346
            revision: 9
            datasource: Prometheus
          longhorn:
            gnetId: 16888
            revision: 9
            datasource: Prometheus
          postgresql:
            gnetId: 9628
            revision: 7
            datasource: Prometheus
          redis:
            gnetId: 11835
            revision: 1
            datasource: Prometheus
          cert-manager:
            gnetId: 11001
            revision: 1
            datasource: Prometheus
          blackbox-exporter:
            gnetId: 13659
            revision: 1
            datasource: Prometheus
          cilium:
            gnetId: 16611
            revision: 1
            datasource: Prometheus
      resources:
        requests:
          cpu: 25m
          memory: 370Mi
        limits:
          memory: 512Mi

    # Cilium runs with kube-proxy replacement — there is no kube-proxy to scrape,
    # so disable its (always-failing) scrape job + KubeProxyDown alert.
    kubeProxy:
      enabled: false

    prometheus:
      prometheusSpec:
        retention: 14d
        retentionSize: 8GB
        # Enables the TSDB delete_series admin API (internal-only via the svc) so
        # stale series can be purged, e.g. the old non-/ping radarr/prowlarr probes.
        enableAdminAPI: true
        # Discover ServiceMonitors/PodMonitors/Probes created by subcharts and
        # standalone manifests, not just those labelled release=kube-prometheus-stack.
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        resources:
          requests:
            cpu: 50m
            memory: 512Mi
          limits:
            memory: 1Gi
      # LAN-only ingress (no external-dns annotation → resolvable only internally, like Grafana).
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - prometheus.${SECRET_DOMAIN}
        paths:
          - /
        tls:
          - hosts:
              - prometheus.${SECRET_DOMAIN}

    prometheusOperator:
      resources:
        requests:
          cpu: 15m
          memory: 128Mi
        limits:
          memory: 256Mi

    kube-state-metrics:
      resources:
        requests:
          cpu: 15m
          memory: 64Mi
        limits:
          memory: 128Mi

    nodeExporter:
      enabled: true

    prometheus-node-exporter:
      resources:
        requests:
          cpu: 15m
          memory: 100Mi
        limits:
          memory: 128Mi
