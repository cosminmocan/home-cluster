---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: 11.10.0
      sourceRef:
        kind: HelmRepository
        name: chart-prometheus-community
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: blackbox-exporter
    # LAN-only ingress (no external-dns annotation → resolvable only internally, like Grafana).
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: blackbox.${SECRET_DOMAIN}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - blackbox.${SECRET_DOMAIN}
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
    # Resolve every ingress hostname to the Traefik ingress IP, so probes hit the
    # real ingress path (routing + the wildcard TLS cert) regardless of split-horizon
    # / public DNS. The external (bare-metal) services are reached the same way,
    # since they are proxied through Traefik too.
    hostAliases:
      - ip: "${NIGNX_INGRESS_IP}"
        hostnames:
          - "auth.${SECRET_DOMAIN}"
          - "docs.${SECRET_DOMAIN}"
          - "drive.${SECRET_DOMAIN}"
          - "goldilocks.${SECRET_DOMAIN}"
          - "grafana.${SECRET_DOMAIN}"
          - "ha.${SECRET_DOMAIN}"
          - "jellyfin.${SECRET_DOMAIN}"
          - "jellyseerr.${SECRET_DOMAIN}"
          - "longhorn.${SECRET_DOMAIN}"
          - "music.${SECRET_DOMAIN}"
          - "pgadmin.${SECRET_DOMAIN}"
          - "photos.${SECRET_DOMAIN}"
          - "prowlarr.${SECRET_DOMAIN}"
          - "qbittorrent.${SECRET_DOMAIN}"
          - "radarr.${SECRET_DOMAIN}"
    # Use the chart's default modules (http_2xx, tcp_connect, icmp, ...).
