---
# Bare-metal services proxied through the cluster — blackbox is the ONLY thing
# that can tell whether these are up (nothing scrapes them).
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: external-services
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  interval: 60s
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - "https://jellyfin.${SECRET_DOMAIN}"
        - "https://ha.${SECRET_DOMAIN}"
        - "https://drive.${SECRET_DOMAIN}"
        - "https://music.${SECRET_DOMAIN}"
        - "https://photos.${SECRET_DOMAIN}"
      labels:
        tier: external
---
# In-cluster apps — probed end-to-end through Traefik (routing + wildcard TLS).
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: cluster-apps
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  interval: 60s
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - "https://grafana.${SECRET_DOMAIN}"
        - "https://goldilocks.${SECRET_DOMAIN}"
        - "https://longhorn.${SECRET_DOMAIN}"
        - "https://pgadmin.${SECRET_DOMAIN}"
        - "https://qbittorrent.${SECRET_DOMAIN}"
        - "https://jellyseerr.${SECRET_DOMAIN}"
        - "https://docs.${SECRET_DOMAIN}"
        - "https://auth.${SECRET_DOMAIN}"
      labels:
        tier: cluster
---
# Servarr apps (Radarr/Prowlarr) have auth enabled, so GET / returns 401 and
# fails http_2xx. Probe their unauthenticated /ping health endpoint instead.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: servarr-apps
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  interval: 60s
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - "https://radarr.${SECRET_DOMAIN}/ping"
        - "https://prowlarr.${SECRET_DOMAIN}/ping"
      labels:
        tier: cluster
