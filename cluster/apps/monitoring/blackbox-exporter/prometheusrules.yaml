---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: blackbox-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: blackbox.uptime
      rules:
        - alert: BlackboxProbeDown
          expr: probe_success == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Endpoint {{ $labels.instance }} is down"
            description: "The blackbox probe for {{ $labels.instance }} (tier {{ $labels.tier }}) has been failing for more than 5 minutes."

        - alert: BlackboxProbeHttpFailure
          expr: probe_http_status_code >= 500
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.instance }} returning HTTP {{ $value }}"
            description: "The endpoint is reachable but returning a 5xx status for more than 5 minutes."

    - name: blackbox.tls
      rules:
        - alert: BlackboxSslCertExpiringSoon
          expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "TLS cert for {{ $labels.instance }} expires in {{ $value | printf \"%.0f\" }} days"
            description: "The certificate served at {{ $labels.instance }} is within 14 days of expiry."
